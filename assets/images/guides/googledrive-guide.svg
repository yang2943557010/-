<svg xmlns="http://www.w3.org/2000/svg" width="415" height="640" viewBox="0 0 415 640">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="415" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="rgba(66,133,244,0.75)"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="180" x2="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef3ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="headerShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(66,133,244,0.35)"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="415" height="640" fill="url(#bodyGrad)"/>

  <!-- 顶部 Header -->
  <rect width="415" height="210" rx="0" fill="url(#headerGrad)" filter="url(#headerShadow)"/>
  <!-- Header 装饰圆 -->
  <circle cx="385" cy="-20" r="100" fill="white" fill-opacity="0.06"/>
  <circle cx="435" cy="160" r="80" fill="white" fill-opacity="0.05"/>
  <circle cx="-20" cy="180" r="70" fill="white" fill-opacity="0.05"/>

  <!-- APP 图标占位圆 -->
  <circle cx="207.5" cy="80" r="40" fill="white" fill-opacity="0.2"/>
  <circle cx="207.5" cy="80" r="34" fill="white" fill-opacity="0.15"/>
  <text x="207.5" y="92" text-anchor="middle" font-size="32">🌈</text>

  <!-- APP 名称 -->
  <text x="207.5" y="142" text-anchor="middle" fill="white" font-size="20" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Google Drive</text>
  <text x="207.5" y="166" text-anchor="middle" fill="white" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif" opacity="0.85">扫码访问步骤指引</text>

  <!-- 波浪分隔 -->
  <path d="M0,200 Q103.75,220 207.5,200 Q311.25,180 415,200 L415,210 L0,210 Z" fill="url(#bodyGrad)"/>

  <!-- 步骤卡片 -->
  <g filter="url(#cardShadow)">
    
    <!-- Step 1 -->
    <rect x="24" y="230" width="367" height="100" rx="16" fill="white"/>
    <rect x="24" y="230" width="367" height="100" rx="16" fill="none" stroke="#4285f4" stroke-width="1" stroke-opacity="0.15"/>
    <!-- 序号圆 -->
    <circle cx="72" cy="280" r="26" fill="#4285f4" fill-opacity="0.12"/>
    <circle cx="72" cy="280" r="20" fill="#4285f4"/>
    <text x="72" y="286" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">1</text>
    <!-- 步骤图标 -->
    <text x="72" y="260" text-anchor="middle" font-size="16">📱</text>
    <!-- 竖线连接（非最后一步） -->
    <line x1="72" y1="330" x2="72" y2="348" stroke="#4285f4" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,3"/>
    <!-- 标题 -->
    <text x="116" y="268" fill="#111827" font-size="15" font-weight="600" font-family="'PingFang SC','Microsoft YaHei',sans-serif">打开Google Drive</text>
    <!-- 描述 -->
    <text x="290" y="268" text-anchor="middle" fill="#6b7280" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">在手机上找到并打开</text>
      <text x="290" y="286" text-anchor="middle" fill="#6b7280" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Google Drive应用</text>
    <!-- Step 2 -->
    <rect x="24" y="348" width="367" height="100" rx="16" fill="white"/>
    <rect x="24" y="348" width="367" height="100" rx="16" fill="none" stroke="#4285f4" stroke-width="1" stroke-opacity="0.15"/>
    <!-- 序号圆 -->
    <circle cx="72" cy="398" r="26" fill="#4285f4" fill-opacity="0.12"/>
    <circle cx="72" cy="398" r="20" fill="#4285f4"/>
    <text x="72" y="404" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">2</text>
    <!-- 步骤图标 -->
    <text x="72" y="378" text-anchor="middle" font-size="16">➕</text>
    <!-- 竖线连接（非最后一步） -->
    <line x1="72" y1="448" x2="72" y2="466" stroke="#4285f4" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,3"/>
    <!-- 标题 -->
    <text x="116" y="386" fill="#111827" font-size="15" font-weight="600" font-family="'PingFang SC','Microsoft YaHei',sans-serif">点击右下角"+"</text>
    <!-- 描述 -->
    <text x="290" y="386" text-anchor="middle" fill="#6b7280" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">点击右下角加号</text>
      <text x="290" y="404" text-anchor="middle" fill="#6b7280" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">按钮</text>
    <!-- Step 3 -->
    <rect x="24" y="466" width="367" height="100" rx="16" fill="white"/>
    <rect x="24" y="466" width="367" height="100" rx="16" fill="none" stroke="#4285f4" stroke-width="1" stroke-opacity="0.15"/>
    <!-- 序号圆 -->
    <circle cx="72" cy="516" r="26" fill="#4285f4" fill-opacity="0.12"/>
    <circle cx="72" cy="516" r="20" fill="#4285f4"/>
    <text x="72" y="522" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">3</text>
    <!-- 步骤图标 -->
    <text x="72" y="496" text-anchor="middle" font-size="16">📷</text>
    <!-- 竖线连接（非最后一步） -->
    
    <!-- 标题 -->
    <text x="116" y="504" fill="#111827" font-size="15" font-weight="600" font-family="'PingFang SC','Microsoft YaHei',sans-serif">选择"扫描"功能</text>
    <!-- 描述 -->
    <text x="290" y="504" text-anchor="middle" fill="#6b7280" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">选择扫描功能对准</text>
      <text x="290" y="522" text-anchor="middle" fill="#6b7280" font-size="13" font-family="'PingFang SC','Microsoft YaHei',sans-serif">左侧二维码</text>
  </g>

  <!-- 底部提示 -->
  <rect x="24" y="578" width="367" height="44" rx="22" fill="#4285f4" fill-opacity="0.1"/>
  <rect x="24" y="578" width="367" height="44" rx="22" fill="none" stroke="#4285f4" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="207.5" y="605" text-anchor="middle" fill="#4285f4" font-size="13" font-weight="600" font-family="'PingFang SC','Microsoft YaHei',sans-serif">📌 扫描左侧二维码即可访问资源</text>
</svg>