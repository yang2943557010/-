<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>链接生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f6fb;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 40px 80px rgba(2, 6, 23, 0.06);
    }
    h1 { font-size: 24px; color: #0b1220; margin-bottom: 28px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; color: #374151; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 16px;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button:hover { background: #2d4a6f; }
    .result {
      margin-top: 24px;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
    .result-label { font-size: 13px; color: #6b7280; margin-bottom: 10px; }
    .result-link { 
      font-size: 14px; 
      color: #3b82f6; 
      word-break: break-all;
      line-height: 1.6;
    }
    .copy-btn {
      margin-top: 16px;
      background: #22c55e;
    }
    .copy-btn:hover { background: #16a34a; }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #0b1220;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">链接已复制到剪贴板</div>
  
  <div class="container">
    <h1>🔗 分享链接生成器</h1>
    
    <div class="form-group">
      <label>目标URL（必填）</label>
      <input type="url" id="targetUrl" placeholder="https://pan.quark.cn/s/xxx?pwd=1234" oninput="autoExtractCode()">
    </div>
    
    <div class="form-group">
      <label>资源名称（可选）</label>
      <input type="text" id="resourceName" placeholder="我的资源">
    </div>
    
    <div class="form-group">
      <label>提取码（可选，会自动从URL提取）</label>
      <input type="text" id="extractCode" placeholder="自动提取或手动输入">
    </div>
    
    <button onclick="generateLink()">生成分享链接</button>
    
    <div class="result" id="result" style="display: none;">
      <div class="result-label">生成的分享链接：</div>
      <div class="result-link" id="generatedLink"></div>
      <button class="copy-btn" onclick="copyLink()">复制链接</button>
    </div>
  </div>

  <script>
    // Base64编码函数
    function encodeUrl(url) {
      try {
        const encoded = btoa(encodeURIComponent(url));
        return encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      } catch (e) {
        return null;
      }
    }

    // 自动从URL提取提取码
    function autoExtractCode() {
      const targetUrl = document.getElementById('targetUrl').value.trim();
      const codeInput = document.getElementById('extractCode');
      
      if (!targetUrl) return;
      
      try {
        const url = new URL(targetUrl);
        // 尝试从pwd参数提取
        const pwd = url.searchParams.get('pwd') || url.searchParams.get('password') || url.searchParams.get('code');
        if (pwd && !codeInput.value) {
          codeInput.value = pwd;
        }
      } catch (e) {
        // URL解析失败，尝试正则匹配
        const pwdMatch = targetUrl.match(/[?&]pwd=([^&]+)/i) || 
                         targetUrl.match(/[?&]password=([^&]+)/i) ||
                         targetUrl.match(/[?&]code=([^&]+)/i);
        if (pwdMatch && !codeInput.value) {
          codeInput.value = pwdMatch[1];
        }
      }
    }

    function generateLink() {
      const targetUrl = document.getElementById('targetUrl').value.trim();
      const name = document.getElementById('resourceName').value.trim();
      const code = document.getElementById('extractCode').value.trim();

      if (!targetUrl) {
        showToast('请输入目标URL');
        return;
      }

      const encodedUrl = encodeUrl(targetUrl);
      if (!encodedUrl) {
        showToast('URL编码失败');
        return;
      }

      // 构建分享链接
      const baseUrl = window.location.origin + window.location.pathname.replace('generator.html', 'index.html');
      let shareUrl = `${baseUrl}?u=${encodedUrl}`;
      
      if (name) shareUrl += `&n=${encodeURIComponent(name)}`;
      if (code) shareUrl += `&c=${encodeURIComponent(code)}`;

      document.getElementById('generatedLink').textContent = shareUrl;
      document.getElementById('result').style.display = 'block';
    }

    function copyLink() {
      const link = document.getElementById('generatedLink').textContent;
      navigator.clipboard.writeText(link).then(() => {
        showToast('链接已复制到剪贴板');
      }).catch(() => {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = link;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('链接已复制到剪贴板');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
